<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Memoraid - Detect Person</title>
  <link rel="stylesheet" href="/static/style.css" />
  <!-- The old inline <style> block has been removed, as all styles are now in style.css -->
</head>
<body>
  <h1>🧠👀 Memoraid</h1>

  <!-- This main wrapper is used for the professional, full-width layout -->
  <main class="container">
    <section class="card">
      <!-- Your h2 heading is now correctly included -->
      <h2>Recognize Person</h2>

      <div class="live-view-wrapper">
        <video id="rec-video" autoplay playsinline></video>
        <div id="notification-area"></div>
      </div>

      <canvas id="rec-canvas" style="display:none;"></canvas>

      <div class="controls">
        <button id="rec-start">Start Camera</button>
        <button id="rec-capture">Capture & Recognize Now</button>
        <button id="rec-stop">Stop Camera</button>
        <button id="caregiver-login">Caregiver Login</button>
      </div>
      
      <div id="rec-result" class="result-box">No result yet.</div>
    </section>
  </main> <!-- End of the main container -->

  <!-- Caregiver login modal -->
  <div id="login-modal" class="modal">
    <div class="box">
      <h3>Caregiver Login</h3>
      <input id="login-password" type="password" placeholder="Password" />
      <div style="margin-top:10px;">
        <button id="login-submit">Login</button>
        <button id="login-cancel">Cancel</button>
      </div>
      <div id="login-msg" style="color:rgb(255, 0, 0); margin-top:8px;"></div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
