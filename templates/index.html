
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Memoraid Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <h1>🧠 Memoraid - Dashboard</h1>

  <!-- Recognize Person -->
  <section class="card">
    <h2>Recognize Person</h2>
    <video id="rec-video" autoplay playsinline></video>
    <canvas id="rec-canvas" style="display:none;"></canvas>

    <div class="controls">
      <button id="rec-start">Start Detection</button>
      <button id="rec-capture">Capture</button>
      <button id="rec-stop">Stop Detection</button>
    </div>

    <div id="rec-result" class="result-box">No result yet.</div>
  </section>

  <!-- Add Person -->
  <section class="card">
    <h2>Add Person</h2>

    <div class="sub">
      <h3>Upload Image</h3>
      <input id="upload-name" placeholder="Name" />
      <input id="upload-relation" placeholder="Relation" />
      <input id="upload-file" type="file" accept="image/*" />
      <button id="upload-add">Add Person (Upload)</button>
    </div>

    <hr/>

    <div class="sub">
      <h3>Add via Camera</h3>
      <video id="add-video" autoplay playsinline style="display:none;"></video>
      <canvas id="add-canvas" style="display:none;"></canvas>

      <input id="cam-name" placeholder="Name" />
      <input id="cam-relation" placeholder="Relation" />
      <div class="controls">
        <button id="add-open">Open Camera</button>
        <button id="add-capture">Capture Image</button>
        <button id="add-close">Close Camera</button>
        <button id="add-submit">Add Person (From Camera)</button>
      </div>

      <div id="added-preview" class="result-box">No preview</div>
    </div>
  </section>

  <!-- Reminders -->
  <section class="card">
    <h2>Reminders</h2>
    <input id="rem-user" placeholder="User" />
    <input id="rem-time" type="time" />
    <input id="rem-message" placeholder="Message" />
    <button id="rem-add">Add Reminder</button>

    <div id="rem-list" class="result-box"></div>
  </section>

  <script src="/static/script.js"></script>
</body>
</html>
