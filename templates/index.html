<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memoraid</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        video { max-width: 400px; border: 1px solid #333; margin: 10px 0; }
        canvas { display: none; }
        .face-card { border: 1px solid #ccc; padding: 5px; margin: 5px; display: inline-block; width: 150px; text-align: center; }
        .detected-entry { margin: 5px 0; }
        .conf { font-size: 0.9em; color: gray; }
        .reminder-item { margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Memoraid</h1>

    <!-- ================= Add Face ================= -->
    <section>
        <h2>Add Face</h2>
        <input type="text" id="face-name" placeholder="Name">
        <input type="text" id="face-relation" placeholder="Relation">
        <br><br>
        <input type="file" id="face-file" accept="image/*">
        <button onclick="addFaceFile()">Add Face (File)</button>
        <br><br>
        <button onclick="openAddFaceWebcam()">Open Webcam</button>
        <button onclick="addFace()">Add Face (Webcam)</button>
        <br>
        <video id="add-face-video" autoplay></video>
        <canvas id="add-face-canvas"></canvas>
        <div id="added-faces"></div>
    </section>

    <hr>

    <!-- ================= Recognize Face ================= -->
    <section>
        <h2>Recognize Face</h2>
        <input type="file" id="recognize-file" accept="image/*">
        <button onclick="recognizeFaceFile()">Recognize (File)</button>
        <br><br>
        <button onclick="recognizeFaceWebcam()">Open Webcam for Recognition</button>
        <video id="recognize-video" autoplay></video>
        <canvas id="recognize-canvas"></canvas>
        <div id="recognized-faces"></div>
    </section>

    <hr>

    <!-- ================= Live Detection ================= -->
    <section>
        <h2>Live Face Detection</h2>
        <button onclick="startFaceDetection()">Start Detection</button>
        <button onclick="stopFaceDetection()">Stop Detection</button>
        <br>
        <video id="detect-video" autoplay></video>
        <canvas id="detect-canvas"></canvas>
        <div id="detected-faces"></div>
    </section>

    <hr>

    <!-- ================= Reminders ================= -->
    <section>
        <h2>Reminders</h2>
        <input type="text" id="reminder-user" placeholder="User">
        <input type="time" id="reminder-time">
        <input type="text" id="reminder-message" placeholder="Message">
        <button onclick="addReminder()">Add Reminder</button>
        <div id="reminder-list"></div>
    </section>

    <script src="/static/script.js"></script>
</body>
</html>
