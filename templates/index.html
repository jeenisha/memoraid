<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoraid - Dementia Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Memoraid - Dementia Assistant</h1>
    </header>

    <main>
        <!-- Section 1: Recognize Person -->
        <section id="recognize-person">
            <h2>Recognize Person</h2>
            <button id="startDetectionBtn">Start Detection</button>
            <div id="detectionArea" style="display: none;">
                <video id="webcamFeed" width="640" height="480" autoplay></video>
                <button id="captureFaceBtn">Capture</button>
                <button id="stopDetectionBtn">Stop Detection</button>
            </div>
            <div id="recognizedPersonDetails" class="result-box">
                <h3>Recognized Person Details:</h3>
                <p>Name: <span id="recognizedName">N/A</span></p>
                <p>Relation: <span id="recognizedRelation">N/A</span></p>
            </div>
        </section>

        <!-- Section 2: Add Person -->
        <section id="add-person">
            <h2>Add Person</h2>

            <h3>Upload Image</h3>
            <form id="uploadImageForm" enctype="multipart/form-data">
                <input type="file" id="uploadFileInput" name="file" accept="image/*" required>
                <input type="text" id="uploadNameInput" name="name" placeholder="Name" required>
                <input type="text" id="uploadRelationInput" name="relation" placeholder="Relation" required>
                <button type="submit">Add Person (Upload)</button>
            </form>

            <h3>Use Camera</h3>
            <button id="startAddCameraBtn">Use Camera</button>
            <div id="addCameraArea" style="display: none;">
                <video id="addWebcamFeed" width="640" height="480" autoplay></video>
                <button id="captureAddFaceBtn">Capture Image</button>
                <button id="stopAddCameraBtn">Stop Camera</button>
                <img id="capturedAddImagePreview" src="#" alt="Captured Image" style="display:none; max-width: 300px; max-height: 200px; border: 1px solid #ccc; margin-top: 10px;">
                <form id="addFromCameraForm" style="margin-top: 10px;">
                    <input type="hidden" id="addCameraImageData" name="image_data_url">
                    <input type="text" id="addCameraNameInput" name="name" placeholder="Name" required>
                    <input type="text" id="addCameraRelationInput" name="relation" placeholder="Relation" required>
                    <button type="submit">Add Person (Camera)</button>
                </form>
            </div>
        </section>

        <!-- Section 3: Reminders -->
        <section id="reminders">
            <h2>Reminders</h2>

            <h3>Add New Reminder</h3>
            <form id="addReminderForm">
                <select id="reminderPersonSelect" name="person_name" required>
                    <option value="">Select Person</option>
                    <!-- Options populated by JS -->
                </select>
                <input type="time" id="reminderTimeInput" name="time" required>
                <input type="text" id="reminderMessageInput" name="message" placeholder="Reminder Message" required>
                <button type="submit">Add Reminder</button>
            </form>

            <h3>All Reminders</h3>
            <div id="remindersList">
                <!-- Reminders will be listed here by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Memoraid. All rights reserved.</p>
    </footer>

    <script src="/static/script.js"></script>
</body>
</html>
